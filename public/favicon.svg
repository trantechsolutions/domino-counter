<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 180" fill="none">
  <!-- Domino tile background -->
  <rect x="4" y="4" width="92" height="172" rx="14" ry="14" fill="#1e1b4b" />
  <!-- Inner border highlight -->
  <rect x="8" y="8" width="84" height="164" rx="11" ry="11" fill="none" stroke="#4f46e5" stroke-width="2" opacity="0.6"/>
  <!-- Dividing line -->
  <line x1="14" y1="90" x2="86" y2="90" stroke="#4f46e5" stroke-width="3" stroke-linecap="round"/>
  <!-- Top half: 6 pips (3x2) -->
  <circle cx="30" cy="38" r="7" fill="#6366f1"/>
  <circle cx="50" cy="38" r="7" fill="#6366f1"/>
  <circle cx="70" cy="38" r="7" fill="#6366f1"/>
  <circle cx="30" cy="62" r="7" fill="#6366f1"/>
  <circle cx="50" cy="62" r="7" fill="#6366f1"/>
  <circle cx="70" cy="62" r="7" fill="#6366f1"/>
  <!-- Bottom half: 3 pips (diagonal) -->
  <circle cx="30" cy="112" r="7" fill="#a5b4fc"/>
  <circle cx="50" cy="135" r="7" fill="#a5b4fc"/>
  <circle cx="70" cy="158" r="7" fill="#a5b4fc"/>
</svg>
